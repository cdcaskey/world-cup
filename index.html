  .sub { margin-top: 14px; color: var(--ink-soft); font-size: 14.5px; max-width: 60ch; }

  .theme-toggle button { border: none; background: none; cursor: pointer; color: var(--ink-faint); font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing:.04em; padding: 6px 10px; border-radius: 999px; text-transform: uppercase; transition: all .2s; }

  let html = '';
  [...days.keys()].sort().forEach(key=>{
    const day = days.get(key);
    const rounds = [...new Set(day.items.map(i=>i.round))];
    const tag = rounds.map(r=> r==='Group' ? 'Group stage' : r).join(' · ');
    html += `<section class="day" data-day="${key}"><div class="day-head"><span class="day-date">${day.label}</span><span class="day-meta">${tag}</span></div>`;
    day.items.forEach(m=>{
      const time = dispTime(m.inst);
      const ldate = dispDate(m.inst);
      const abbr = tzAbbr(m.inst);
      const sep = m.score ? `<span class="score">${m.score[0]}<span class="s-dash">–</span>${m.score[1]}</span>` : `<span class="v">v</span>`;
      const teamsHtml = `<div class="teams">${renderSide(m.home)} ${sep} ${renderSide(m.away)}</div>`;
      const penHtml = (m.score && m.score.length === 4) ? `<div class="pen-note">${(m.score[2] > m.score[3] ? m.home : m.away)} won ${Math.max(m.score[2],m.score[3])}–${Math.min(m.score[2],m.score[3])} on penalties</div>` : '';
      const badge = m.ko ? `<span class="badge ko">${m.round}</span>` : `<span class="badge">Group ${m.group}</span>`;
      html += `
        <div class="match">
          <div class="ko-time">
            <span class="t">${time}</span>
            <span class="bst">${abbr}</span>
            <span class="ldate">${ldate}</span>
            <span class="chan ${chanClass(m.ch)}">${chanLabel(m.ch)}</span>
          </div>
          <div class="info">
            ${teamsHtml}
            ${penHtml}
            <div class="meta-row">
              ${badge}
              <span class="venue">${m.venue} <span class="city">· ${m.city}</span></span>
              <span class="dot">·</span>
              <span class="local">${localTime(m.inst, m.tz)} local</span>
            </div>
          </div>
        </div>`;
    });
    html += `</section>`;
  });
  listEl.innerHTML = html;
}

const controls = document.getElementById('controls');
const filterToggle = document.getElementById('filterToggle');
const ftCount = document.getElementById('ftCount');
const resetBtn = document.getElementById('resetBtn');

function updateFilterState(){
  const active = [daySel, stageSel, groupSel, teamSel, venueSel, chanSel].filter(s=>s.value!=='all').length;
  ftCount.textContent = active;
  ftCount.classList.toggle('show', active>0);
  resetBtn.classList.toggle('show', active>0);
}

filterToggle.addEventListener('click', ()=>{
  const open = controls.classList.toggle('open');
  filterToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
});

const todayBtn = document.getElementById('todayBtn');
todayBtn.addEventListener('click', ()=>{
  const todayKey = localKey(new Date(), dispTz);
  const sections = [...listEl.querySelectorAll('.day[data-day]')];
  if (!sections.length) return;
  const target = sections.find(s => s.dataset.day === todayKey)
    || sections.find(s => s.dataset.day > todayKey)
    || sections[sections.length - 1];
  target.scrollIntoView({ behavior: 'smooth', block: 'start' });
});
resetBtn.addEventListener('click', ()=>{
  daySel.value='all'; stageSel.value='all'; groupSel.value='all'; teamSel.value='all'; venueSel.value='all'; chanSel.value='all';
  render();
});

tzSel.addEventListener('change', ()=>{ dispTz = tzSel.value; render(); });
daySel.addEventListener('change', render);
venueSel.addEventListener('change', render);
stageSel.addEventListener('change', render);
groupSel.addEventListener('change', ()=>{ if(groupSel.value!=='all') teamSel.value='all'; render(); });
teamSel.addEventListener('change', ()=>{ if(teamSel.value!=='all') groupSel.value='all'; render(); });
chanSel.addEventListener('change', render);

const toggle = document.getElementById('themeToggle');
function setTheme(mode){
  if (mode === 'auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', mode);
  [...toggle.children].forEach(b=>b.classList.toggle('active', b.dataset.mode===mode));
}
toggle.addEventListener('click', e=>{ const b=e.target.closest('button'); if(b) setTheme(b.dataset.mode); });
setTheme('auto');

render();
</script>
</body>
</html>
